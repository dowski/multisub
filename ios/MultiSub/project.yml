name: MultiSub
options:
  bundleIdPrefix: com.multisub
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
  configs:
    Debug:
      EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
packages:
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift
    from: "0.8.1"
targets:
  MultiSub:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.multisub.MultiSub
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ConvexMobile
        product: ConvexMobile
